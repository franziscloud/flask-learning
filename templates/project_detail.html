{% extends "base.html" %}

{% block title %}{{ project.name }}{% endblock %}

{% block content %}
    <h1>{{ project.name }}</h1>
    <p>{{ project.description }}</p>
    {% if project.url != '#' %}
        <a href="{{ project.url }}">Visit Live Site →</a>
    {% else %}
        <p>Coming Soon.</p>
    {% endif %}
    <br>
    <a href="{{ url_for('projects') }}">← Back to Projects</a>
{% endblock %}
