{% extends "base.html" %}

{% block title %}Projects{% endblock %}

{% block content%}
    <h2>My Projects</h2>
        {% for project in projects %}
            <div class="project-card">
                <h3>{{ project.name }}</h3>
                <p>{{ project.description }}</p>
                <a href="{{ url_for('project_detail', project_id=project.id) }}">View →</a>
            </div>
        {% endfor %}
{% endblock %}
